services:
  litellm-proxy:
    image: docker.litellm.ai/berriai/litellm:main-stable
    container_name: litellm-proxy
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ${CA_CERT_PATH}:/usr/local/share/ca-certificates/rootCA.crt:ro
    env_file:
      - .env
    entrypoint: >
      bash -c "cat /usr/local/share/ca-certificates/rootCA.crt >> /etc/ssl/certs/ca-certificates.crt && litellm --config /app/config.yaml --port 4000"
    restart: unless-stopped
    networks:
      - default
      - open-webui
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  open-webui:
    external: true
    name: open-webui-stack_app-net
