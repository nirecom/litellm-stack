# Override for when Open WebUI runs on the same Docker host.
# This creates a shared network so containers can communicate by name
# (e.g. http://litellm-proxy:4000/v1).
#
# Delete this file if litellm-stack runs on a separate host.
services:
  litellm-proxy:
    networks:
      - default
      - shared

networks:
  shared:
    driver: bridge
    name: shared-llm-net
